<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PodPulse</title>
    <script>
      // Aplica la clase "dark" antes del primer render para evitar un flash
      // del tema equivocado — ver ThemeProvider (default oscuro si no hay
      // preferencia guardada todavía).
      (function () {
        var stored = localStorage.getItem("podpulse-theme");
        document.documentElement.classList.toggle("dark", stored !== "light");
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
